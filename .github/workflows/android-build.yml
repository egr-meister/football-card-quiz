name: Android Release Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform & build tools
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate Gradle wrapper (if missing)
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.9
          fi
          chmod +x ./gradlew

      - name: Create local.properties
        env:
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}
        run: |
          # sdk.dir is provided automatically by the setup-android action via ANDROID_HOME.
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          # Optional API token. If the secret is missing, use the placeholder so the
          # app falls back to demo match data and the build still succeeds.
          if [ -n "$FOOTBALL_DATA_API_TOKEN" ]; then
            echo "FOOTBALL_DATA_API_TOKEN=$FOOTBALL_DATA_API_TOKEN" >> local.properties
          else
            echo "FOOTBALL_DATA_API_TOKEN=your_api_token_here" >> local.properties
          fi
          echo "FOOTBALL_API_BASE_URL=https://api.football-data.org/v4" >> local.properties

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing. A real PKCS12 keystore is required for signed release builds."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/release-keystore.p12"
          echo "ANDROID_KEYSTORE_PATH=$GITHUB_WORKSPACE/release-keystore.p12" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Build signed release AAB
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease --stacktrace

      - name: Verify release APK signature
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/35.0.0"
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::No release APK found."
            exit 1
          fi
          echo "Verifying: $APK"
          CERT_OUTPUT=$("$BUILD_TOOLS/apksigner" verify --print-certs "$APK")
          echo "$CERT_OUTPUT"
          if echo "$CERT_OUTPUT" | grep -q "CN=Android Debug"; then
            echo "::error::Release APK is signed with a DEBUG certificate. Failing to prevent Play rejection."
            exit 1
          fi
          echo "Release APK signature verified (not a debug certificate)."

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: football-card-quiz-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: football-card-quiz-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
